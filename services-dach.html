document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Inter Tight';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"dab641ec-b064-4a46-b7d3-d7a8d88b52ac\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Inter Tight';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"09c2217d-1b3b-4711-ad27-f7b9b2b7b106\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   DE.INDI.GO — DESIGN SYSTEM\n   ============================================================\n   Single source of truth for tokens, primitives, and shared\n   chrome (header + footer styles) used across every page.\n\n   How to use:\n     1. <link rel=\"stylesheet\" href=\"design-system.css\"> in <head>.\n        Load Google Fonts immediately before it.\n     2. Copy the SHARED HEADER and SHARED FOOTER HTML blocks\n        marked at the bottom of this file (in /* ... *\\/ comments)\n        into each page's <body> verbatim. Update only the\n        `aria-current` on the active nav item and the active\n        `.lang` link per page.\n     3. Set the page-specific lang on <html> (de or en) and\n        update the lang toggle hrefs to point to the locale pair.\n     4. Page-specific CSS goes in a <style> block on the page,\n        AFTER this stylesheet, scoped to that page only.\n\n   Conventions:\n     - Token names follow domain-role-variant: --color-indigo-700,\n       --space-section-lg, --font-display.\n     - No hard-coded hex outside :root.\n     - No gradients. No drop shadows. No brand colour used as\n       background fill behind body copy.\n   ============================================================ */\n\n:root {\n  /* -----------------------------------------------------------\n     COLOUR — palette spine, not accents\n     -----------------------------------------------------------\n     Indigo carries the brand: header, hero display, primary\n     CTA borders, footer ground. Warm paper keeps the page off-\n     SaaS. Sand is the SINGLE accent — used sparingly (≤5\n     occurrences per page), never as a fill.\n  */\n\n  /* Ink + brand spine */\n  --color-indigo-900:   #0e1020;   /* primary copy, footer ground */\n  --color-indigo-700:   #1e2353;   /* brand spine, hero display, CTA border */\n  --color-indigo-500:   #3a4180;   /* metadata, links on paper */\n  --color-indigo-300:   #8a90c0;   /* tertiary, currently unused */\n\n  /* Paper surfaces */\n  --color-paper:        #f5f0e8;   /* primary background */\n  --color-ivory:        #fbf7f0;   /* secondary surface (anchor strip, insight band) */\n\n  /* Hairlines */\n  --color-rule:         #d9cfbf;   /* primary 1px rule */\n  --color-rule-soft:    #e6ddcc;   /* fainter divider, header bottom */\n\n  /* Single accent — sand */\n  --color-sand:         #b8845a;   /* eyebrow rule, wordmark dots, section numbers */\n  --color-sand-soft:    #d9bfa3;   /* dark-mode counterpart in footer */\n\n  /* Aliases — semantic names, prefer these in page CSS */\n  --color-bg:           var(--color-paper);\n  --color-bg-alt:       var(--color-ivory);\n  --color-text:         var(--color-indigo-900);\n  --color-text-muted:   var(--color-indigo-500);\n  --color-brand:        var(--color-indigo-700);\n  --color-accent:       var(--color-sand);\n  --color-line:         var(--color-rule);\n  --color-line-soft:    var(--color-rule-soft);\n  --color-on-dark:      var(--color-paper);   /* text colour on indigo-900 ground */\n\n  /* -----------------------------------------------------------\n     TYPOGRAPHY — families\n     -----------------------------------------------------------\n     Display (Fraunces) used ONLY for h1–h3, blockquotes, the\n     wordmark, and one editorial pull-line per page. Body sans\n     for everything else. Mono not used (kept commented out\n     for future code/listing pages).\n  */\n  --font-display: \"Fraunces\", \"Source Serif 4\", Georgia, serif;\n  --font-body:    \"Inter Tight\", \"Helvetica Neue\", Arial, sans-serif;\n  /* --font-mono: \"JetBrains Mono\", \"SFMono-Regular\", Menlo, monospace; */\n\n  /* Variation-settings presets for Fraunces (variable) */\n  --fv-display-xl:  \"opsz\" 144, \"SOFT\" 30,  \"wght\" 350;  /* hero */\n  --fv-display-xl-i:\"opsz\" 144, \"SOFT\" 100, \"wght\" 350;  /* hero italic accent */\n  --fv-display-l:   \"opsz\" 96,  \"SOFT\" 30,  \"wght\" 380;  /* h2 */\n  --fv-display-l-i: \"opsz\" 96,  \"SOFT\" 100, \"wght\" 350;  /* anchor italic */\n  --fv-display-m:   \"opsz\" 72,  \"SOFT\" 30,  \"wght\" 400;  /* h3 */\n  --fv-display-s:   \"opsz\" 36,  \"SOFT\" 30,  \"wght\" 420;  /* h4 (member name) */\n  --fv-display-w:   \"opsz\" 24,  \"SOFT\" 30,  \"wght\" 500;  /* wordmark */\n\n  /* -----------------------------------------------------------\n     TYPOGRAPHY — scale (fluid)\n     -----------------------------------------------------------\n     Sizes are clamped between mobile-min and desktop-max.\n     line-height is paired explicitly per token to keep\n     vertical rhythm consistent.\n  */\n  --fs-display-xl:   clamp(44px, 6.6vw, 92px);   /* hero h1            */ --lh-display-xl:  0.98;\n  --fs-display-l:    clamp(34px, 4.4vw, 56px);   /* section h2         */ --lh-display-l:   1.02;\n  --fs-display-m:    clamp(26px, 2.8vw, 34px);   /* journey h3         */ --lh-display-m:   1.10;\n  --fs-display-s:    clamp(22px, 2.4vw, 30px);   /* anchor statement   */ --lh-display-s:   1.25;\n  --fs-display-xs:   clamp(20px, 2.2vw, 26px);   /* pull quote (italic)*/ --lh-display-xs:  1.35;\n\n  --fs-h4:           clamp(17px, 1.35vw, 19px);  /* member name        */ --lh-h4:          1.20;\n  --fs-post-title:   clamp(20px, 1.7vw, 25px);   /* blog post card     */ --lh-post-title:  1.20;\n  --fs-post-title-l: clamp(26px, 2.4vw, 36px);   /* primary blog card  */ --lh-post-title-l:1.20;\n\n  --fs-lede:         clamp(18px, 1.6vw, 21px);   /* section ledes      */ --lh-lede:        1.55;\n  --fs-body:         17px;                       /* default body       */ --lh-body:        1.65;\n  --fs-body-md:      clamp(16px, 1.35vw, 18px);  /* hero positioning   */ --lh-body-md:     1.65;\n  --fs-meta:         14px;                       /* footer items       */ --lh-meta:        1.65;\n  --fs-cta:          15px;                       /* primary link CTA   */\n  --fs-cta-quiet:    14px;                       /* secondary link CTA */\n  --fs-eyebrow:      12px;                       /* uppercase eyebrows */\n  --fs-eyebrow-sm:   11px;                       /* footer column heads*/\n  --fs-mini:         13px;                       /* role tagline, lang */\n  --fs-tiny:         10px;                       /* placeholder labels */\n\n  /* Letter-spacing presets */\n  --ls-display:      -0.022em;\n  --ls-display-tight:-0.028em;\n  --ls-display-mid:  -0.018em;\n  --ls-display-near: -0.014em;\n  --ls-display-loose:-0.010em;\n  --ls-eyebrow:      0.18em;\n  --ls-eyebrow-loose:0.20em;\n  --ls-uppercase:    0.14em;\n  --ls-meta:         0.02em;\n  --ls-wordmark:     0.02em;\n\n  /* Font weights */\n  --fw-light:    300;\n  --fw-regular:  400;\n  --fw-medium:   500;\n  --fw-semibold: 600;\n\n  /* -----------------------------------------------------------\n     SPACING — 8px-rooted scale\n     -----------------------------------------------------------\n     Use the named section/space tokens for layout. Direct px\n     values acceptable only inside small components.\n  */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-7:  28px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-14: 56px;\n  --space-16: 64px;\n  --space-20: 80px;\n\n  /* Page rhythm */\n  --space-section:        clamp(80px, 10vw, 140px);  /* default vertical band */\n  --space-section-lg:     clamp(80px, 12vw, 160px);  /* hero top              */\n  --space-section-xl:     clamp(96px, 14vw, 180px);  /* hero bottom           */\n  --space-section-sm:     clamp(36px, 5vw, 56px);    /* anchor strip          */\n  --space-section-head:   clamp(48px, 7vw, 80px);    /* gap below h2 → grid   */\n  --space-section-cta:    clamp(56px, 7vw, 88px);    /* gap before footer cta */\n  --space-foot-top:       clamp(72px, 9vw, 112px);   /* footer top padding    */\n  --space-foot-bot:       clamp(32px, 4vw, 48px);    /* footer bottom padding */\n  --space-foot-grid-gap:  clamp(32px, 5vw, 64px);\n  --space-foot-grid-mb:   clamp(56px, 7vw, 88px);\n  --space-grid-row:       clamp(24px, 3vw, 40px);\n  --space-grid-col:       clamp(20px, 2.5vw, 32px);\n  --space-card-pad:       clamp(32px, 4.5vw, 56px);\n\n  /* -----------------------------------------------------------\n     LAYOUT\n  */\n  --layout-mw:        1200px;        /* content max width */\n  --layout-gutter:    clamp(20px, 4vw, 48px);\n  --layout-prose:     58ch;          /* body prose max-width */\n  --layout-narrow:    44ch;          /* pull-line max-width */\n  --layout-side:      46ch;          /* aside lede */\n  --layout-card-min:  360px;         /* journey card min height */\n\n  /* -----------------------------------------------------------\n     RADII + LINES\n  */\n  --radius-xs: 2px;        /* lang toggle, focus rings */\n  --line-1px:  1px solid var(--color-line);\n  --line-soft: 1px solid var(--color-line-soft);\n\n  /* -----------------------------------------------------------\n     MOTION\n  */\n  --ease-std:   cubic-bezier(.2, .6, .2, 1);\n  --dur-fast:   .2s;\n  --dur-mid:    .25s;\n  --dur-slow:   .6s;\n  --dur-reveal: .9s;\n\n  /* -----------------------------------------------------------\n     BREAKPOINTS — reference values (CSS doesn't honour vars\n     in @media queries, so these are documentary; keep the\n     widths in sync with @media rules below).\n  */\n  --bp-xs:  520px;   /* footer collapses to 1col            */\n  --bp-sm:  640px;   /* insight grid → 1col                 */\n  --bp-md:  720px;   /* team grid → 2col                    */\n  --bp-lg:  820px;   /* journeys → 1col, section-head stack */\n  --bp-xl:  860px;   /* nav → menu button                   */\n  --bp-2xl: 900px;   /* hero stacks                         */\n  --bp-3xl: 980px;   /* team grid → 3col, insight → 2col    */\n}\n\n/* ============================================================\n   RESET + BASE\n   ============================================================ */\n*, *::before, *::after { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\n@media (prefers-reduced-motion: reduce) {\n  html { scroll-behavior: auto; }\n}\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  font-weight: var(--fw-regular);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--color-text);\n  background: var(--color-bg);\n  font-feature-settings: \"ss01\", \"cv11\";\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\na   { color: inherit; text-decoration: none; }\nimg { max-width: 100%; display: block; }\n\n/* ============================================================\n   TYPOGRAPHY PRIMITIVES\n   ============================================================ */\n.eyebrow {\n  font-family: var(--font-body);\n  font-size: var(--fs-eyebrow);\n  font-weight: var(--fw-medium);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--color-text-muted);\n}\n.lede {\n  font-family: var(--font-body);\n  font-size: var(--fs-lede);\n  line-height: var(--lh-lede);\n  font-weight: var(--fw-regular);\n  color: var(--color-text);\n  max-width: var(--layout-prose);\n  text-wrap: pretty;\n}\n.rule {\n  height: 1px; border: 0; margin: 0;\n  background: var(--color-line);\n}\n\n/* ============================================================\n   LAYOUT PRIMITIVES\n   ============================================================ */\n.wrap {\n  max-width: var(--layout-mw);\n  margin: 0 auto;\n  padding-inline: var(--layout-gutter);\n}\n\n/* Default section band */\nsection.band { padding: var(--space-section) 0; }\n\n/* Section head — h2 + lede on a single row */\n.section-head {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: clamp(32px, 6vw, 80px);\n  align-items: end;\n  margin-bottom: var(--space-section-head);\n}\n.section-head .num {\n  display: block;\n  margin-bottom: var(--space-4);\n  font-family: var(--font-body);\n  font-size: var(--fs-eyebrow);\n  font-weight: var(--fw-medium);\n  letter-spacing: var(--ls-eyebrow);\n  text-transform: uppercase;\n  color: var(--color-accent);\n}\n.section-head h2 {\n  margin: 0;\n  font-family: var(--font-display);\n  font-variation-settings: var(--fv-display-l);\n  font-size: var(--fs-display-l);\n  line-height: var(--lh-display-l);\n  letter-spacing: var(--ls-display);\n  color: var(--color-brand);\n  text-wrap: balance;\n}\n.section-head .right {\n  color: var(--color-text);\n  max-width: var(--layout-side);\n  justify-self: end;\n}\n@media (max-width: 820px) {\n  .section-head { grid-template-columns: 1fr; gap: var(--space-5); align-items: start; }\n  .section-head .right { justify-self: start; }\n}\n\n/* ============================================================\n   LINK / CTA PRIMITIVES\n   ============================================================ */\n\n/* Primary link CTA — paper backgrounds */\n.cta-link {\n  display: inline-flex; align-items: center;\n  gap: var(--space-3);\n  font-family: var(--font-body);\n  font-size: var(--fs-cta);\n  font-weight: var(--fw-medium);\n  color: var(--color-brand);\n  padding: var(--space-2) 0;\n  border-bottom: 1px solid var(--color-brand);\n  transition: gap var(--dur-mid) var(--ease-std),\n              color var(--dur-fast) var(--ease-std),\n              border-color var(--dur-fast) var(--ease-std);\n}\n.cta-link .arrow { transition: transform var(--dur-mid) var(--ease-std); }\n.cta-link:hover { gap: 14px; color: var(--color-indigo-900); border-color: var(--color-indigo-900); }\n.cta-link:hover .arrow { transform: translateX(4px); }\n\n/* Quiet secondary link */\n.cta-quiet {\n  display: inline-flex; align-items: center; gap: var(--space-3);\n  font-family: var(--font-body);\n  font-size: var(--fs-cta-quiet);\n  font-weight: var(--fw-medium);\n  color: var(--color-text-muted);\n  letter-spacing: var(--ls-meta);\n}\n.cta-quiet:hover { color: var(--color-brand); }\n.cta-quiet .arrow { transition: transform var(--dur-mid) var(--ease-std); }\n.cta-quiet:hover .arrow { transform: translateX(3px); }\n\n/* ============================================================\n   SHARED HEADER (.site)\n   ============================================================\n   Sticky, ultra-thin. Persistent Kontakt link on the right.\n*/\nheader.site {\n  position: sticky; top: 0; z-index: 50;\n  background: color-mix(in srgb, var(--color-paper) 92%, transparent);\n  backdrop-filter: saturate(140%) blur(8px);\n  border-bottom: var(--line-soft);\n}\n.site-row {\n  display: flex; align-items: center; justify-content: space-between;\n  height: 72px;\n}\n.wordmark {\n  display: inline-flex; align-items: baseline; gap: 2px;\n  font-family: var(--font-display);\n  font-variation-settings: var(--fv-display-w);\n  font-size: 22px;\n  letter-spacing: var(--ls-wordmark);\n  color: var(--color-brand);\n}\n.wordmark .dot { color: var(--color-accent); padding-inline: 1px; }\nnav.primary ul {\n  list-style: none; display: flex; gap: var(--space-7); margin: 0; padding: 0;\n  font-size: var(--fs-meta); font-weight: var(--fw-medium);\n}\nnav.primary a {\n  color: var(--color-indigo-900);\n  padding: var(--space-2) 2px;\n  border-bottom: 1px solid transparent;\n  transition: border-color var(--dur-fast) var(--ease-std), color var(--dur-fast) var(--ease-std);\n}\nnav.primary a:hover, nav.primary a[aria-current=\"page\"] { border-color: var(--color-brand); }\nnav.primary a.contact {\n  color: var(--color-brand);\n  border-bottom: 1px solid var(--color-brand);\n}\n.lang {\n  display: inline-flex; gap: var(--space-2);\n  font-size: var(--fs-mini); font-weight: var(--fw-medium);\n  color: var(--color-text-muted);\n  font-variant-numeric: tabular-nums;\n}\n.lang a { padding: var(--space-1) var(--space-2); border-radius: var(--radius-xs); }\n.lang a.active { color: var(--color-indigo-900); }\n.lang a:not(.active) { color: var(--color-text-muted); }\n.lang a:not(.active):hover { color: var(--color-indigo-900); }\n.lang .sep { color: var(--color-line); }\n\n.head-right { display: flex; align-items: center; gap: var(--space-5); }\n\n.menubtn {\n  display: none;\n  background: none; border: 1px solid var(--color-line);\n  color: var(--color-indigo-900);\n  font: var(--fw-medium) var(--fs-mini)/1 var(--font-body);\n  letter-spacing: 0.08em; text-transform: uppercase;\n  padding: var(--space-3) 14px; border-radius: var(--radius-xs);\n  cursor: pointer;\n}\n@media (max-width: 860px) {\n  nav.primary { display: none; }\n  .menubtn { display: inline-flex; align-items: center; gap: var(--space-2); }\n  nav.primary.open {\n    display: block; position: absolute; top: 72px; left: 0; right: 0;\n    background: var(--color-paper); border-bottom: var(--line-1px);\n  }\n  nav.primary.open ul {\n    flex-direction: column; gap: 0;\n    padding: var(--space-4) var(--layout-gutter) var(--space-6);\n  }\n  nav.primary.open li { padding: var(--space-3) 0; border-bottom: var(--line-soft); }\n  nav.primary.open li:last-child { border-bottom: 0; }\n}\n\n/* ============================================================\n   SHARED FOOTER (footer.site)\n   ============================================================ */\nfooter.site {\n  background: var(--color-indigo-900);\n  color: var(--color-on-dark);\n  padding: var(--space-foot-top) 0 var(--space-foot-bot);\n}\nfooter.site .foot-grid {\n  display: grid;\n  grid-template-columns: 1.2fr 1fr 1fr 1fr;\n  gap: var(--space-foot-grid-gap);\n  margin-bottom: var(--space-foot-grid-mb);\n}\n@media (max-width: 860px) { footer.site .foot-grid { grid-template-columns: 1fr 1fr; } }\n@media (max-width: 520px) { footer.site .foot-grid { grid-template-columns: 1fr; } }\n\nfooter.site .wordmark { color: var(--color-on-dark); }\nfooter.site .wordmark .dot { color: var(--color-sand-soft); }\nfooter.site h5 {\n  font-family: var(--font-body);\n  font-size: var(--fs-eyebrow-sm);\n  font-weight: var(--fw-medium);\n  letter-spacing: var(--ls-eyebrow-loose);\n  text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-on-dark) 65%, transparent);\n  margin: 0 0 var(--space-5);\n}\nfooter.site p, footer.site a {\n  font-size: var(--fs-meta);\n  line-height: var(--lh-meta);\n  color: color-mix(in srgb, var(--color-on-dark) 88%, transparent);\n}\nfooter.site a:hover { color: var(--color-on-dark); }\nfooter.site address { font-style: normal; }\nfooter.site ul { list-style: none; margin: 0; padding: 0; display: grid; gap: var(--space-2); }\nfooter.site .foot-tag { margin-top: var(--space-4); max-width: 32ch; }\nfooter.site .foot-engagement-lead { margin: 0 0 14px; max-width: 30ch; }\n\n.foot-bar {\n  border-top: 1px solid color-mix(in srgb, var(--color-on-dark) 18%, transparent);\n  padding-top: var(--space-7);\n  display: flex; justify-content: space-between; align-items: center;\n  flex-wrap: wrap; gap: var(--space-4);\n  font-size: var(--fs-eyebrow);\n  color: color-mix(in srgb, var(--color-on-dark) 65%, transparent);\n  letter-spacing: var(--ls-meta);\n}\n.foot-bar .legal { display: flex; gap: var(--space-6); }\n.foot-bar .lang a:not(.active) { color: color-mix(in srgb, var(--color-on-dark) 55%, transparent); }\n.foot-bar .lang a.active { color: var(--color-on-dark); }\n.foot-bar .lang .sep { color: color-mix(in srgb, var(--color-on-dark) 25%, transparent); }\n\n/* ============================================================\n   FOCUS RINGS + REVEAL UTILITY\n   ============================================================ */\na:focus-visible, button:focus-visible {\n  outline: 2px solid var(--color-brand);\n  outline-offset: 3px;\n  border-radius: var(--radius-xs);\n}\nfooter.site a:focus-visible { outline-color: var(--color-on-dark); }\n\n.reveal {\n  opacity: 0; transform: translateY(14px);\n  transition: opacity var(--dur-reveal) var(--ease-std),\n              transform var(--dur-reveal) var(--ease-std);\n}\n.reveal.in { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce) {\n  .reveal, .reveal.in { opacity: 1; transform: none; transition: none; }\n}\n\n/* ============================================================\n   SHARED HTML PARTIALS — copy into each page verbatim\n   ============================================================\n\n   <!-- SHARED HEADER START -->\n   <header class=\"site\" role=\"banner\">\n     <div class=\"wrap site-row\">\n       <a class=\"wordmark\" href=\"/\" aria-label=\"DE.INDI.GO — Start\">\n         DE<span class=\"dot\" aria-hidden=\"true\">.<\u002Fspan>INDI<span class=\"dot\" aria-hidden=\"true\">.<\u002Fspan>GO\n       <\u002Fa>\n       <nav class=\"primary\" id=\"primary-nav\" aria-label=\"Hauptnavigation\">\n         <ul>\n           <li><a href=\"/\">Start<\u002Fa><\u002Fli>\n           <li><a href=\"/service\">Services<\u002Fa><\u002Fli>\n           <li><a href=\"/team\">Team<\u002Fa><\u002Fli>\n           <li><a href=\"/blog\">Blog<\u002Fa><\u002Fli>\n           <li><a href=\"/links\">Links<\u002Fa><\u002Fli>\n           <li><a class=\"contact\" href=\"/kontakt\">Kontakt<\u002Fa><\u002Fli>\n         <\u002Ful>\n       <\u002Fnav>\n       <div class=\"head-right\">\n         <span class=\"lang\" aria-label=\"Sprache\">\n           <a href=\"/\" class=\"active\" aria-current=\"page\">DE<\u002Fa>\n           <span class=\"sep\" aria-hidden=\"true\">/<\u002Fspan>\n           <a href=\"/en\">EN<\u002Fa>\n         <\u002Fspan>\n         <button class=\"menubtn\" aria-expanded=\"false\" aria-controls=\"primary-nav\"\n           onclick=\"const n=document.getElementById('primary-nav');\n                    const o=n.classList.toggle('open');\n                    this.setAttribute('aria-expanded', o);\">Menü<\u002Fbutton>\n       <\u002Fdiv>\n     <\u002Fdiv>\n   <\u002Fheader>\n   <!-- SHARED HEADER END -->\n\n   <!-- SHARED FOOTER START -->\n   <footer class=\"site\" role=\"contentinfo\">\n     <div class=\"wrap\">\n       <div class=\"foot-grid\">\n         <div>\n           <a class=\"wordmark\" href=\"/\" aria-label=\"DE.INDI.GO — Start\">\n             DE<span class=\"dot\" aria-hidden=\"true\">.<\u002Fspan>INDI<span class=\"dot\" aria-hidden=\"true\">.<\u002Fspan>GO\n           <\u002Fa>\n           <p class=\"foot-tag\">\n             Indo-German business — we believe in it. Beratung, Schulung und\n             projektbezogene Unterstützung seit 2003.\n           <\u002Fp>\n         <\u002Fdiv>\n         <div>\n           <h5>Kontakt<\u002Fh5>\n           <address>\n             Dittrichring 4<br>\n             04109 Leipzig<br><br>\n             <a href=\"tel:+4934186059864\">+49 341 860 59 864<\u002Fa><br>\n             <a href=\"mailto:markus@deindigo.de\">markus@deindigo.de<\u002Fa>\n           <\u002Faddress>\n         <\u002Fdiv>\n         <div>\n           <h5>Navigation<\u002Fh5>\n           <ul>\n             <li><a href=\"/service/dach\">Service DACH → Indien<\u002Fa><\u002Fli>\n             <li><a href=\"/service/indien\">Service Indien → DACH<\u002Fa><\u002Fli>\n             <li><a href=\"/team\">Team<\u002Fa><\u002Fli>\n --------------------------------------------\n     Tokens, primitives, header + footer all live in design-system.css.\n     Nothing in this block introduces a new colour, type family, or\n     spacing rhythm. Two minimal extensions of established patterns,\n     used only on this page (and the forthcoming Indien-DACH twin):\n\n       (a) Hero variant — uses the homepage hero-grid skeleton but\n           drops the indigo fill on h1 (kept ink-coloured) so the\n           italic accent in the lede on the right becomes the only\n           tonal counterpoint. Lede sits in the right column exactly\n           as the homepage's hero-side does, just larger.\n\n       (b) Phase chapter mark + capability list — chapter number set\n           in Fraunces at hero-near scale, treated as a marginal\n           ordinal, not a checklist item. Capability list items are\n           rendered as line-broken statements separated by hairlines\n           (var(--color-line-soft)), with an em-dash splitting the\n           subject from its detail. Same family, same scale tokens\n           as the homepage; no new sizes invented.\n\n       (c) Phase 3 sub-grouping — small uppercase eyebrow + Fraunces\n           sub-heading at fs-h4. Subordinate, never decorative.\n\n       (d) Public-institutions section — ivory band (.section-alt),\n           single column at narrow prose width, hairlines top + bottom.\n           Mirrors the homepage's anchor-strip treatment but holds\n           a list, not a sentence.\n     ============================================================ */\n\n  /* ---------- HERO (variant of homepage hero) ---------- */\n  section.hero {\n    padding: var(--space-section-lg) 0 var(--space-section-xl);\n    position: relative;\n    overflow: hidden;\n  }\n  .hero-grid {\n    display: grid;\n    grid-template-columns: minmax(0, 7fr) minmax(0, 5fr);\n    gap: clamp(40px, 8vw, 120px);\n    align-items: end;\n  }\n  @media (max-width: 900px) { .hero-grid { grid-template-columns: 1fr; gap: 48px; } }\n  .hero-kicker { display: inline-flex; align-items: center; gap: 14px; color: var(--color-text-muted); }\n  .hero-kicker::before { content: \"\"; width: 36px; height: 1px; background: var(--color-accent); }\n  h1.hero-title {\n    margin: 24px 0 0;\n    font-family: var(--font-display);\n    font-variation-settings: var(--fv-display-xl);\n    font-size: clamp(40px, 5.4vw, 76px);   /* one notch under homepage XL */\n    line-height: 1.02;\n    letter-spacing: var(--ls-display-tight);\n    color: var(--color-brand);\n    text-wrap: balance;\n  }\n  .hero-side {\n    padding-bottom: 10px;\n    border-left: var(--line-1px);\n    padding-left: clamp(24px, 4vw, 40px);\n  }\n  @media (max-width: 900px) {\n    .hero-side { border-left: 0; padding-left: 0; border-top: var(--line-1px); padding-top: 40px; }\n  }\n  .hero-lede {\n    margin: 0;\n    font-family: var(--font-body);\n    font-size: var(--fs-body-md);\n    line-height: var(--lh-body-md);\n    color: var(--color-text);\n    text-wrap: pretty;\n  }\n\n  /* ---------- BRIDGE — ivory anchor band, italic display line ---------- */\n  section.bridge {\n    border-top: var(--line-1px);\n    border-bottom: var(--line-1px);\n    background: var(--color-bg-alt);\n    padding: var(--space-section-sm) 0;\n  }\n  .bridge-row {\n    display: grid;\n    grid-template-columns: auto 1fr;\n    gap: clamp(24px, 4vw, 56px);\n    align-items: center;\n  }\n  @media (max-width: 780px) { .bridge-row { grid-template-columns: 1fr; gap: 16px; } }\n  .bridge-label {\n    font-family: var(--font-body);\n    font-size: var(--fs-eyebrow);\n    font-weight: var(--fw-medium);\n    letter-spacing: var(--ls-eyebrow);\n    text-transform: uppercase;\n    color: var(--color-text-muted);\n    white-space: nowrap;\n  }\n  .bridge-statement {\n    margin: 0;\n    font-family: var(--font-display);\n    font-variation-settings: var(--fv-display-l);\n    font-weight: var(--fw-regular);\n    font-size: var(--fs-display-s);\n    line-height: var(--lh-display-s);\n    letter-spacing: -0.012em;\n    color: var(--color-text);\n    text-wrap: balance;\n  }\n  .bridge-statement em {\n    font-style: italic;\n    color: var(--color-text-muted);\n    font-variation-settings: var(--fv-display-l-i);\n  }\n\n  /* ---------- PHASES — the structural backbone ---------- */\n  section.phases { padding: var(--space-section) 0 var(--space-section-cta); }\n\n  .phase {\n    display: grid;\n    grid-template-columns: minmax(220px, 5fr) minmax(0, 7fr);\n    gap: clamp(32px, 6vw, 96px);\n    padding: var(--space-section) 0;\n    border-top: var(--line-1px);\n  }\n  .phase:first-of-type { border-top: 0; padding-top: 0; }\n  .phase:last-of-type  { padding-bottom: 0; }\n  @media (max-width: 820px) {\n    .phase { grid-template-columns: 1fr; gap: var(--space-10); padding: var(--space-section) 0; }\n  }\n\n  /* Left column: chapter mark + heading */\n  .phase-mark {\n    display: flex; flex-direction: column; gap: var(--space-7);\n    align-self: start;\n    position: sticky; top: 96px;   /* 72px header + 24px breathing */\n  }\n  @media (max-width: 820px) {\n    .phase-mark { position: static; gap: var(--space-5); }\n  }\n  .phase-num {\n    font-family: var(--font-display);\n    font-variation-settings: \"opsz\" 144, \"SOFT\" 30, \"wght\" 300;\n    font-size: clamp(64px, 7.4vw, 104px);\n    line-height: 0.9;\n    color: var(--color-accent);\n    letter-spacing: var(--ls-display-tight);\n    font-feature-settings: \"lnum\", \"tnum\";\n  }\n  .phase h2 {\n    margin: 0;\n    font-family: var(--font-display);\n    font-variation-settings: var(--fv-display-l);\n    font-size: var(--fs-display-l);\n    line-height: var(--lh-display-l);\n    letter-spacing: var(--ls-display);\n    color: var(--color-brand);\n    text-wrap: balance;\n    max-width: 14ch;\n  }\n\n  /* Right column: italic tagline + capability list (+ phase-3 subgroups) */\n  .phase-body { padding-top: clamp(0px, 1.5vw, 18px); }\n\n  .phase-tagline {\n    margin: 0 0 clamp(28px, 3.5vw, 44px);\n    font-family: var(--font-display);\n    font-variation-settings: var(--fv-display-m);\n    font-style: italic;\n    font-size: var(--fs-display-xs);\n    line-height: var(--lh-display-xs);\n    letter-spacing: var(--ls-display-near);\n    color: var(--color-text);\n    max-width: 32ch;\n    text-wrap: balance;\n  }\n\n  /* Capability list — Economist-style hairline-ruled em-dash items */\n  .cap-list { list-style: none; margin: 0; padding: 0; }\n  .cap-list > li {\n    border-top: var(--line-soft);\n    padding: clamp(16px, 1.6vw, 22px) 0;\n    font-family: var(--font-body);\n    font-size: var(--fs-body-md);\n    line-height: 1.55;\n    color: var(--color-text);\n    text-wrap: pretty;\n  }\n  .cap-list > li:last-child { border-bottom: var(--line-soft); }\n  .cap-list .term {\n    color: var(--color-indigo-900);\n    font-weight: var(--fw-medium);\n  }\n  .cap-list .em-dash {\n    color: var(--color-text-muted);\n    padding: 0 0.4em;\n    font-weight: var(--fw-regular);\n  }\n  .cap-list .detail { color: var(--color-text); }\n\n  /* Phase-3 sub-groupings */\n  .phase-subs { display: flex; flex-direction: column; gap: clamp(36px, 4vw, 56px); }\n  .phase-sub-eyebrow {\n    display: block;\n    font-family: var(--font-body);\n    font-size: var(--fs-eyebrow);\n    font-weight: var(--fw-medium);\n    letter-spacing: var(--ls-eyebrow);\n    text-transform: uppercase;\n    color: var(--color-accent);\n    margin-bottom: var(--space-3);\n  }\n  .phase-sub h3 {\n    margin: 0 0 clamp(16px, 1.6vw, 22px);\n    font-family: var(--font-display);\n    font-variation-settings: var(--fv-display-s);\n    font-weight: var(--fw-regular);\n    font-size: clamp(20px, 1.7vw, 25px);\n    line-height: var(--lh-post-title);\n    letter-spacing: var(--ls-display-near);\n    color: var(--color-indigo-900);\n  }\n\n  /* ---------- PUBLIC INSTITUTIONS — ivory band ---------- */\n  section.section-alt {\n    background: var(--color-bg-alt);\n    border-top: var(--line-1px);\n    border-bottom: var(--line-1px);\n    padding: var(--space-section) 0;\n  }\n  .alt-grid {\n    display: grid;\n    grid-template-columns: minmax(220px, 5fr) minmax(0, 7fr);\n    gap: clamp(32px, 6vw, 96px);\n    align-items: start;\n  }\n  @media (max-width: 820px) { .alt-grid { grid-template-columns: 1fr; gap: var(--space-10); } }\n  .alt-eyebrow {\n    display: block;\n    margin-bottom: var(--space-4);\n    font-family: var(--font-body);\n    font-size: var(--fs-eyebrow);\n    font-weight: var(--fw-medium);\n    letter-spacing: var(--ls-eyebrow);\n    text-transform: uppercase;\n    color: var(--color-accent);\n  }\n  .alt-head h2 {\n    margin: 0 0 clamp(20px, 2vw, 28px);\n    font-family: var(--font-display);\n    font-variation-settings: var(--fv-display-l);\n    font-size: clamp(28px, 3.4vw, 42px);\n    line-height: 1.05;\n    letter-spacing: var(--ls-display);\n    color: var(--color-brand);\n    text-wrap: balance;\n    max-width: 18ch;\n  }\n  .alt-lede {\n    margin: 0 0 clamp(28px, 3.5vw, 44px);\n    font-family: var(--font-body);\n    font-size: var(--fs-body-md);\n    line-height: var(--lh-body-md);\n    color: var(--color-text);\n    max-width: 60ch;\n    text-wrap: pretty;\n  }\n\n  /* ---------- CLOSING CTA ---------- */\n  section.close {\n    padding: var(--space-section) 0;\n    text-align: center;\n  }\n  .close-line {\n    margin: 0 auto var(--space-6);\n    max-width: var(--layout-narrow);\n    font-family: var(--font-display);\n    font-variation-settings: var(--fv-display-m);\n    font-style: italic;\n    font-size: var(--fs-display-xs);\n    line-height: var(--lh-display-xs);\n    color: var(--color-brand);\n    text-wrap: balance;\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- SHARED HEADER START -->\n<header class=\"site\" role=\"banner\">\n  <div class=\"wrap site-row\">\n    <a class=\"wordmark\" href=\"/\" aria-label=\"DE.INDI.GO — Start\">\n      DE<span class=\"dot\" aria-hidden=\"true\">.<\u002Fspan>INDI<span class=\"dot\" aria-hidden=\"true\">.<\u002Fspan>GO\n    <\u002Fa>\n    <nav class=\"primary\" id=\"primary-nav\" aria-label=\"Hauptnavigation\">\n      <ul>\n        <li><a href=\"/\">Start<\u002Fa><\u002Fli>\n        <li><a href=\"/service\" aria-current=\"page\">Services<\u002Fa><\u002Fli>\n        <li><a href=\"/team\">Team<\u002Fa><\u002Fli>\n        <li><a href=\"/blog\">Blog<\u002Fa><\u002Fli>\n        <li><a href=\"/links\">Links<\u002Fa><\u002Fli>\n        <li><a class=\"contact\" href=\"/kontakt\">Kontakt<\u002Fa><\u002Fli>\n      <\u002Ful>\n    <\u002Fnav>\n    <div class=\"head-right\">\n      <span class=\"lang\" aria-label=\"Sprache\">\n        <a href=\"/service/dach\" class=\"active\" aria-current=\"page\">DE<\u002Fa>\n        <span class=\"sep\" aria-hidden=\"true\">/<\u002Fspan>\n        <a href=\"/en/service/dach\">EN<\u002Fa>\n      <\u002Fspan>\n      <button class=\"menubtn\" aria-expanded=\"false\" aria-controls=\"primary-nav\" onclick=\"const n=document.getElementById('primary-nav');\n                 const o=n.classList.toggle('open');\n                 this.setAttribute('aria-expanded', o);\">Menü<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n<!-- SHARED HEADER END -->\n\n<main>\n\n<!-- HERO -->\n<section class=\"hero\" aria-labelledby=\"hero-title\">\n  <div class=\"wrap hero-grid\">\n    <div>\n      <p class=\"hero-kicker eyebrow reveal\">Service · DACH → Indien<\u002Fp>\n      <h1 class=\"hero-title reveal\" id=\"hero-title\">\n        Ihr Partner für den indischen Markt — von der Entscheidung bis zum Dauerbetrieb.\n      <\u002Fh1>\n    <\u002Fdiv>\n    <aside class=\"hero-side reveal\">\n      <p class=\"hero-lede\">\n        Indien ist der am schnellsten wachsende große Wirtschaftsraum der\n        Welt — und zugleich einer der komplexesten. Wir begleiten deutsche,\n        österreichische und Schweizer Unternehmen, die diesen Markt nicht\n        dem Zufall überlassen wollen: vom ersten Markteintritt bis zum\n        etablierten Indiengeschäft. Unsere Mandanten sind überwiegend\n        Mittelständler, Familienunternehmen und Hidden Champions, die in\n        Indien nicht experimentieren, sondern nachhaltig aufbauen wollen.\n      <\u002Fp>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BRIDGE — introduces the four-phase structure -->\n<section class=\"bridge\" aria-label=\"Struktur\">\n  <div class=\"wrap bridge-row\">\n    <span class=\"bridge-label\">Leistungsspektrum<\u002Fspan>\n    <p class=\"bridge-statement reveal\">\n      Unser Leistungsspektrum ist entlang der <em>vier Phasen<\u002Fem>\n      Ihres Indienengagements strukturiert.\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- THE FOUR PHASES -->\n<section class=\"phases\" aria-label=\"Die vier Phasen\">\n  <div class=\"wrap\">\n\n    <!-- Phase 1 -->\n    <article class=\"phase reveal\" aria-labelledby=\"p1-title\">\n      <header class=\"phase-mark\">\n        <span class=\"phase-num\" aria-hidden=\"true\">01<\u002Fspan>\n        <h2 id=\"p1-title\">Markteintritt planen<\u002Fh2>\n      <\u002Fheader>\n      <div class=\"phase-body\">\n        <p class=\"phase-tagline\">Bevor Sie investieren, schaffen wir Entscheidungssicherheit.<\u002Fp>\n        <ul class=\"cap-list\">\n          <li>\n            <span class=\"term\">Markteintrittsstrategie<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Marktanalyse, Wettbewerbsumfeld, Standort- und Rechtsformwahl sowie belastbarer Business Case.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Markt- und Branchenstudien<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">mit Fokus auf Ihre Produkte, Kundensegmente und regulatorischen Rahmenbedingungen.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Partner- und Kunden-Due-Diligence<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Reputations-, Bonitäts- und Compliance-Prüfung potenzieller indischer Geschäftspartner.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Produkt- und Normanpassung<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Anforderungen an technische Standards, Zertifizierungen (BIS u.&nbsp;a.) und notwendige Anpassungen an den indischen Markt.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Visa- und Aufenthaltsfragen<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">für Ihre entsandten Mitarbeiter.<\u002Fspan>\n          <\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- Phase 2 -->\n    <article class=\"phase reveal\" aria-labelledby=\"p2-title\">\n      <header class=\"phase-mark\">\n        <span class=\"phase-num\" aria-hidden=\"true\">02<\u002Fspan>\n        <h2 id=\"p2-title\">Präsenz aufbauen<\u002Fh2>\n      <\u002Fheader>\n      <div class=\"phase-body\">\n        <p class=\"phase-tagline\">Wir setzen Ihre Entscheidung rechtssicher und operativ tragfähig um.<\u002Fp>\n        <ul class=\"cap-list\">\n          <li>\n            <span class=\"term\">Gesellschaftsgründung<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Aufbau, Organisation und im Bedarfsfall Auflösung von Außendienst, Niederlassungen und Tochtergesellschaften.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Joint Ventures mit indischen Partnern<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Strukturierung, Verhandlung, Governance und spätere Führung.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">M&amp;A-Transaktionen in Indien<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Vorbereitung, Zielsuche, Verhandlung und Closing.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Technologietransfer und Lizenzierung<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">vertragliche Gestaltung und Schutz Ihres IP.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Vertriebs- und Kooperationsverträge<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Verhandlung und Abschluss strategischer Vereinbarungen.<\u002Fspan>\n          <\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- Phase 3 — three sub-groupings -->\n    <article class=\"phase reveal\" aria-labelledby=\"p3-title\">\n      <header class=\"phase-mark\">\n        <span class=\"phase-num\" aria-hidden=\"true\">03<\u002Fspan>\n        <h2 id=\"p3-title\">Operativ erfolgreich werden<\u002Fh2>\n      <\u002Fheader>\n      <div class=\"phase-body\">\n        <p class=\"phase-tagline\">Wir machen Ihr Indiengeschäft skalierbar — in Produktion, Vertrieb und Compliance.<\u002Fp>\n\n        <div class=\"phase-subs\">\n          <section class=\"phase-sub\" aria-labelledby=\"p3a-title\">\n            <h3 id=\"p3a-title\">Produktion und Supply Chain<\u002Fh3>\n            <ul class=\"cap-list\">\n              <li>\n                <span class=\"term\">Produktionsaufbau<\u002Fspan>\n                <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n                <span class=\"detail\">vom Standortentscheid bis zur seriennahen Fertigung.<\u002Fspan>\n              <\u002Fli>\n              <li>\n                <span class=\"term\">Qualitätsmanagement, Controlling und Arbeitssicherheit<\u002Fspan>\n                <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n                <span class=\"detail\">in indischen Werken.<\u002Fspan>\n              <\u002Fli>\n              <li>\n                <span class=\"term\">Materialeinkauf, Supply Chain Management, Logistik und Transport.<\u002Fspan>\n              <\u002Fli>\n              <li>\n                <span class=\"term\">Führung von Joint Ventures und eigenen Produktionsstätten.<\u002Fspan>\n              <\u002Fli>\n              <li>\n                <span class=\"term\">Laufende technische Zertifizierungen und Normenkonformität.<\u002Fspan>\n              <\u002Fli>\n            <\u002Ful>\n          <\u002Fsection>\n\n          <section class=\"phase-sub\" aria-labelledby=\"p3b-title\">\n            <h3 id=\"p3b-title\">Vertrieb und Kundenmanagement<\u002Fh3>\n            <ul class=\"cap-list\">\n              <li>\n                <span class=\"term\">Aufbau von Vertriebsorganisation und -prozessen<\u002Fspan>\n                <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n                <span class=\"detail\">inklusive Vertriebscontrolling.<\u002Fspan>\n              <\u002Fli>\n              <li>\n                <span class=\"term\">Kundensegmentspezifische Vertriebsstrategien<\u002Fspan>\n                <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n                <span class=\"detail\">und BIS-Zertifizierungsprozess.<\u002Fspan>\n              <\u002Fli>\n              <li>\n                <span class=\"term\">After-Sales- und Customer Service<\u002Fspan>\n                <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n                <span class=\"detail\">in ganz Indien.<\u002Fspan>\n              <\u002Fli>\n              <li>\n                <span class=\"term\">Kundenentwicklung, -bewertung und -bindung.<\u002Fspan>\n              <\u002Fli>\n            <\u002Ful>\n          <\u002Fsection>\n\n          <section class=\"phase-sub\" aria-labelledby=\"p3c-title\">\n            <h3 id=\"p3c-title\">Compliance und Regulatorik<\u002Fh3>\n            <ul class=\"cap-list\">\n              <li>\n                <span class=\"term\">LkSG-Compliance in indischen Lieferketten<\u002Fspan>\n                <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n                <span class=\"detail\">von der Risikoanalyse bis zum auditierbaren Nachweis.<\u002Fspan>\n              <\u002Fli>\n              <li>\n                <span class=\"term\">Laufende Überwachung regulatorischer Entwicklungen<\u002Fspan>\n                <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n                <span class=\"detail\">mit Relevanz für Ihr Geschäft.<\u002Fspan>\n              <\u002Fli>\n            <\u002Ful>\n          <\u002Fsection>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n    <!-- Phase 4 -->\n    <article class=\"phase reveal\" aria-labelledby=\"p4-title\">\n      <header class=\"phase-mark\">\n        <span class=\"phase-num\" aria-hidden=\"true\">04<\u002Fspan>\n        <h2 id=\"p4-title\">Menschen und Partner entwickeln<\u002Fh2>\n      <\u002Fheader>\n      <div class=\"phase-body\">\n        <p class=\"phase-tagline\">Erfolg in Indien steht und fällt mit den richtigen Menschen — auf beiden Seiten.<\u002Fp>\n        <ul class=\"cap-list\">\n          <li>\n            <span class=\"term\">Recruiting und Fachkräftebindung<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Personalgewinnung, -auswahl und langfristige Bindung in einem hart umkämpften Arbeitsmarkt.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Interkulturelle Schulungen<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">für deutsche und indische Mitarbeiter sowie Führungskräfte.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Fach- und Expertenschulungen<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">zu Unternehmensführung, Recht, Vertrieb und Produktion in Indien.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Aus-, Fort- und Weiterbildung<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">inklusive Aufbau innerbetrieblicher dualer Berufsausbildung nach deutschem Vorbild.<\u002Fspan>\n          <\u002Fli>\n          <li>\n            <span class=\"term\">Arbeitsbeziehungen<\u002Fspan>\n            <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n            <span class=\"detail\">Umgang mit Gewerkschaften, Konfliktprävention und Eskalationsmanagement.<\u002Fspan>\n          <\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Farticle>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PUBLIC INSTITUTIONS -->\n<section class=\"section-alt\" aria-labelledby=\"alt-title\">\n  <div class=\"wrap alt-grid\">\n    <header class=\"alt-head\">\n      <span class=\"alt-eyebrow\">05 — Öffentliche Hand<\u002Fspan>\n      <h2 id=\"alt-title\">Für öffentliche Institutionen und Verbände<\u002Fh2>\n    <\u002Fheader>\n    <div>\n      <p class=\"alt-lede reveal\">\n        Über die Begleitung einzelner Unternehmen hinaus unterstützen wir\n        Kammern, Verbände, Ministerien und öffentliche Einrichtungen bei\n        ihren indienbezogenen Aktivitäten:\n      <\u002Fp>\n      <ul class=\"cap-list reveal\">\n        <li>\n          <span class=\"term\">Veranstaltungen und Konferenzen<\u002Fspan>\n          <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n          <span class=\"detail\">in Präsenz-, digitaler oder hybrider Form.<\u002Fspan>\n        <\u002Fli>\n        <li>\n          <span class=\"term\">Matchmakings<\u002Fspan>\n          <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n          <span class=\"detail\">mit indischen Unternehmen und Organisationen.<\u002Fspan>\n        <\u002Fli>\n        <li>\n          <span class=\"term\">Delegationsreisen<\u002Fspan>\n          <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n          <span class=\"detail\">Konzeption und Durchführung.<\u002Fspan>\n        <\u002Fli>\n        <li>\n          <span class=\"term\">Kontaktvermittlung<\u002Fspan>\n          <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n          <span class=\"detail\">zu Entscheidungsträgern der deutsch-indischen Wirtschaft und Verwaltung.<\u002Fspan>\n        <\u002Fli>\n        <li>\n          <span class=\"term\">Zusammenarbeit mit indischen Behörden<\u002Fspan>\n          <span class=\"em-dash\" aria-hidden=\"true\">—<\u002Fspan>\n          <span class=\"detail\">Beratung und operative Unterstützung.<\u002Fspan>\n        <\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CLOSING CTA -->\n<section class=\"close\" aria-label=\"Kontakt\">\n  <div class=\"wrap\">\n    <p class=\"close-line reveal\">Sprechen Sie mit uns über Ihren Markteintritt.<\u002Fp>\n    <a class=\"cta-link\" href=\"/kontakt\">\n      Gespräch vereinbaren\n      <span class=\"arrow\" aria-hidden=\"true\">→<\u002Fspan>\n    <\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<!-- SHARED FOOTER START -->\n<footer class=\"site\" role=\"contentinfo\">\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div>\n        <a class=\"wordmark\" href=\"/\" aria-label=\"DE.INDI.GO — Start\">\n          DE<span class=\"dot\" aria-hidden=\"true\">.<\u002Fspan>INDI<span class=\"dot\" aria-hidden=\"true\">.<\u002Fspan>GO\n        <\u002Fa>\n        <p class=\"foot-tag\">\n          Indo-German business — we believe in it. Beratung, Schulung und\n          projektbezogene Unterstützung seit 2003.\n        <\u002Fp>\n      <\u00
